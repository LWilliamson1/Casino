<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Larry's Casino</title>
	<link rel="shortcut icon" type="image/ico" href="ace.ico"/>
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.5/css/bootstrap.min.css">
	<link rel="stylesheet" href="casino.css">
</head>
<body>

	<!-- Navbar -->
	<nav class="navbar navbar-inverse navbar-fixed-top">
		<div class="container">
			<div class="navbar-header">
				<button type="button" class="navbar-toggle collapsed"
				        data-toggle="collapse" data-target="#navbar"
				        aria-expanded="false" aria-controls="navbar">
					<span class="sr-only">Toggle navigation</span>
					<span class="icon-bar"></span>
					<span class="icon-bar"></span>
					<span class="icon-bar"></span>
				</button>
				<a class="navbar-brand" href="#">♠ Larry's Casino</a>
			</div>
			<div id="navbar" class="navbar-collapse collapse">
				<ul class="nav navbar-nav">
					<li class="active"><a href="#">Home</a></li>
					<li><a href="#about">About</a></li>
					<li><a href="#contact">Contact</a></li>
					<li class="dropdown">
						<a href="#" class="dropdown-toggle" data-toggle="dropdown"
						   role="button" aria-haspopup="true" aria-expanded="false">
							Rules <span class="caret"></span>
						</a>
						<ul class="dropdown-menu">
							<li><a href="#">Blackjack pays 3:2</a></li>
							<li><a href="#">Dealer hits on soft 16</a></li>
							<li><a href="#">6-deck shoe</a></li>
						</ul>
					</li>
				</ul>
			</div>
		</div>
	</nav>

	<!-- Casino Royale Hero Banner -->
	<div class="casino-hero">
		<span class="hero-suits">♠ ♥ ♦ ♣</span>
		<h1>Larry's Casino</h1>
		<p>Where Every Hand Counts</p>
	</div>

	<!-- Game Area -->
	<div class="game-area">

		<!-- Dealer (top on mobile, right on desktop) -->
		<div class="hand-section" id="dealer-section">
			<div class="hand-header">
				<span class="hand-title">Dealer</span>
				<span class="hand-score" id="dealerStatus">—</span>
			</div>
			<div class="cards-container" id="Dealer"></div>
		</div>

		<!-- Action Controls -->
		<div class="controls-section">
			<button class="btn-game btn-hit"   id="hit">Hit</button>
			<button class="btn-game btn-stay"  id="stay">Stay</button>
			<button class="btn-game btn-again" id="playAgain">Play Again</button>
		</div>

		<!-- Player (bottom on mobile, left on desktop) -->
		<div class="hand-section" id="player-section">
			<div class="hand-header">
				<span class="hand-title">Player 1</span>
				<span class="hand-score" id="playerStatus">—</span>
			</div>
			<div class="cards-container" id="Player1"></div>
		</div>

	</div>

	<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.3/jquery.min.js"></script>
	<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.5/js/bootstrap.min.js"></script>
	<script src="blackJack.js"></script>
</body>
</html>
